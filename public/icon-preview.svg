<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f7592f"/>
      <stop offset="100%" stop-color="#ff8355"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Folder shadow / depth -->
    <rect x="80" y="228" width="360" height="216" rx="28"
          fill="rgba(0,0,0,0.14)"/>

    <!-- Folder body -->
    <rect x="72" y="220" width="368" height="216" rx="28"
          fill="rgba(255,255,255,0.22)"/>

    <!-- Folder tab -->
    <path
      d="M 72,220 L 72,192 Q 72,176 88,176 L 228,176 Q 244,176 252,192 L 264,220 Z"
      fill="rgba(255,255,255,0.22)"
    />

    <!-- Subtle top highlight -->
    <rect x="72" y="220" width="368" height="3" rx="0"
          fill="rgba(255,255,255,0.20)"/>

    <!-- Content lines inside folder -->
    <rect x="112" y="268" width="200" height="14" rx="7"
          fill="rgba(255,255,255,0.30)"/>
    <rect x="112" y="298" width="140" height="14" rx="7"
          fill="rgba(255,255,255,0.20)"/>
    <rect x="112" y="328" width="168" height="14" rx="7"
          fill="rgba(255,255,255,0.14)"/>

  </g>
</svg>
