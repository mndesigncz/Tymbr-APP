<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Very dark burnt-orange background, lighter toward folder center -->
    <radialGradient id="bg" cx="40%" cy="38%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7c2800"/>
      <stop offset="55%"  stop-color="#481200"/>
      <stop offset="100%" stop-color="#1e0600"/>
    </radialGradient>

    <!-- Soft bloom/glow behind folder -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,175,90,0.52)"/>
      <stop offset="55%"  stop-color="rgba(255,100,30,0.18)"/>
      <stop offset="100%" stop-color="rgba(200,55,0,0)"/>
    </radialGradient>

    <!-- Folder body: cream-orange top → deep orange bottom -->
    <linearGradient id="folderBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffd080"/>
      <stop offset="28%"  stop-color="#ff8c44"/>
      <stop offset="100%" stop-color="#c83610"/>
    </linearGradient>

    <!-- Tab: slightly lighter than body top -->
    <linearGradient id="tabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#ffb060"/>
    </linearGradient>

    <clipPath id="iconShape">
      <rect width="512" height="512" rx="112"/>
    </clipPath>

    <filter id="folderShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="rgba(0,0,0,0.48)"/>
    </filter>
  </defs>

  <g clip-path="url(#iconShape)">

    <!-- Dark background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Warm glow bloom centered on folder -->
    <ellipse cx="244" cy="300" rx="218" ry="195" fill="url(#glow)"/>

    <!-- Folder (tab + body) with drop shadow -->
    <g filter="url(#folderShadow)">

      <!-- Folder tab (top-left) -->
      <path
        d="M 108,206
           L 108,170
           Q 108,154 124,154
           L 228,154
           Q 242,154 248,170
           L 259,206
           Z"
        fill="url(#tabGrad)"
      />

      <!-- Bright white highlight strip on tab top edge -->
      <path
        d="M 114,160
           Q 116,157 124,157
           L 228,157
           Q 238,157 243,168
           L 250,184
           Q 243,176 233,176
           L 124,176
           Q 115,176 113,182
           Z"
        fill="rgba(255,255,255,0.62)"
      />

      <!-- Folder body -->
      <rect x="108" y="206" width="280" height="194" rx="22" fill="url(#folderBody)"/>

      <!-- Subtle inner shine top-left of body -->
      <ellipse cx="180" cy="228" rx="74" ry="26" fill="rgba(255,255,255,0.17)"/>

    </g>

  </g>
</svg>
