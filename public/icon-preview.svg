<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Rounded square background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7592f"/>
      <stop offset="100%" style="stop-color:#ff8c5a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="rgba(247,89,47,0.35)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="24" y="24" width="464" height="230" rx="108" fill="url(#shine)"/>
  <rect x="24" y="24" width="464" height="100" rx="0" fill="url(#shine)"/>

  <!-- N mark — clean geometric -->
  <path
    d="M148 340 L148 172 L200 172 L296 300 L296 172 L348 172 L348 340 L296 340 L200 212 L200 340 Z"
    fill="white"
    opacity="0.95"
  />
</svg>
