<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f7592f"/>
      <stop offset="100%" stop-color="#ff8355"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">

    <!-- ░ Background ░ -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- ░ Document sheets – straight, clean, no rotation ░ -->
    <!-- Sheet B (behind, right-offset) -->
    <rect x="294" y="108" width="78" height="112" rx="10" fill="white" opacity="0.68"/>
    <rect x="308" y="130" width="50" height="7"   rx="3.5" fill="rgba(200,70,20,0.18)"/>
    <rect x="308" y="145" width="36" height="7"   rx="3.5" fill="rgba(200,70,20,0.14)"/>

    <!-- Sheet A (front, left-offset) -->
    <rect x="140" y="92"  width="78" height="128" rx="10" fill="white" opacity="0.84"/>
    <rect x="154" y="116" width="50" height="7"   rx="3.5" fill="rgba(200,70,20,0.18)"/>
    <rect x="154" y="131" width="36" height="7"   rx="3.5" fill="rgba(200,70,20,0.14)"/>

    <!-- ░ Folder shape – single clean path ░ -->
    <!--
      Layout:
        Tab:  x=68..248, y=186..220  (rx=14 on top)
        Body: x=68..444, y=220..442  (rx=22)
    -->
    <path
      d="
        M 82,442
        Q 68,442 68,428
        L 68,220
        L 68,220
        L 248,220
        Q 248,220 260,202
        L 268,188
        Q 274,186 282,186
        L 430,186
        Q 444,186 444,200
        L 444,220
        L 444,428
        Q 444,442 430,442
        Z
      "
      fill="rgba(255,255,255,0.00)"
    />

    <!-- Simpler, more reliable: two separate shapes that perfectly butt together -->
    <!-- Folder tab -->
    <path
      d="M 82,220 L 68,220 L 68,200 Q 68,186 82,186 L 230,186 Q 242,186 248,200 L 256,220 Z"
      fill="rgba(255,255,255,0.26)"
    />
    <!-- Folder body -->
    <rect x="68" y="220" width="376" height="220" rx="22" fill="rgba(255,255,255,0.21)"/>

    <!-- ░ N letter – three clean strokes, centred in folder body ░ -->
    <!--
      Folder body centre: x=256, y=330
      N bounding box: 180×168px  → x: 167..345, y: 246..414
      Bars at x=167 and x=345 (centre offsets ±89)
    -->
    <polyline
      points="167,414 167,246 345,414 345,246"
      fill="none"
      stroke="white"
      stroke-width="46"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.96"
    />

  </g>
</svg>
